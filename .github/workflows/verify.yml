name: verify
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # verify.py uses only the Python standard library and runs offline, re-deriving
      # every published number from the committed data and the post.
      - name: Re-derive and assert every published number
        run: python3 verify.py
